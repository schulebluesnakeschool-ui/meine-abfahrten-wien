<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<title>Meine Abfahrten Wien</title>
<style>
    body {
        font-family: -apple-system, BlinkMacSystemFont, sans-serif;
        background: #f2f2f7;
        margin: 0;
        padding: 20px;
    }
    h1 {
        text-align: center;
        color: #333;
        margin-bottom: 30px;
    }
    .stop-button {
        display: block;
        background: white;
        padding: 18px;
        margin: 12px 0;
        border-radius: 14px;
        font-size: 20px;
        text-decoration: none;
        color: #000;
        font-weight: 600;
        box-shadow: 0 4px 10px rgba(0,0,0,0.1);
        cursor: pointer;
    }
    iframe {
        width: 100%;
        height: 70vh;
        border: none;
        border-radius: 14px;
        margin-top: 20px;
        background: white;
        box-shadow: 0 4px 10px rgba(0,0,0,0.1);
    }
</style>
</head>
<body>

<h1>🚏 Meine Abfahrten Wien</h1>

<div class="stop-button" onclick="show(60202024)">U6 Thaliastraße → Siebenhirten</div>
<div class="stop-button" onclick="show(60202023)">U6 Thaliastraße → Floridsdorf</div>

<div class="stop-button" onclick="show(60200301)">U3 Stephansplatz → Simmering</div>
<div class="stop-button" onclick="show(60200302)">U3 Stephansplatz → Ottakring</div>

<div class="stop-button" onclick="show(60201313)">13A Strozzigasse → Hauptbahnhof</div>
<div class="stop-button" onclick="show(60201312)">13A Strozzigasse → Alser Straße</div>

<div class="stop-button" onclick="show(60204603)">46 Schottenfeldgasse → Joachimsthalerplatz</div>
<div class="stop-button" onclick="show(60204604)">46 Schottenfeldgasse → Volkstheater</div>

<iframe id="frame" src=""></iframe>

<script>
function show(id) {
    document.getElementById("frame").src =
        "https://www.wienerlinien.at/ogd_realtime/monitor?stopId=" + id;
}
</script>

</body>
</html>
